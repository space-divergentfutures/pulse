<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PULSE — Insights</title>
  <link rel="stylesheet" href="onboard.css">
  <link rel="stylesheet" href="insights.css">
</head>
<body>
  <div class="wrap">
    <div class="ins-header">
      <div class="brand small">PULSE</div>
      <h1 class="ins-title" id="insTitle">Building your picture</h1>
      <p class="ins-sub" id="insSub">Every check-in moves the bar.</p>
    </div>

    <!-- Main unlock meter — evidence floor progress -->
    <div class="ins-card meter-card">
      <div class="meter-row">
        <span class="meter-caption" id="meterCaption">Progress to first pattern</span>
        <span class="meter-pct" id="meterPct">0%</span>
      </div>
      <div class="meter-track">
        <div class="meter-fill" id="meterFill"></div>
      </div>
      <div class="meter-detail" id="meterDetail"></div>
    </div>

    <!-- Week-at-a-glance dot chart (unlabelled until unlocked, §7) -->
    <div class="ins-card">
      <div class="ins-card-head">
        <span class="ins-card-title">This week</span>
        <span class="ins-card-sub" id="weekSub"></span>
      </div>
      <div class="week-chart" id="weekChart"><!-- SVG injected by JS --></div>
    </div>

    <!-- Pattern cards — only visible after floor is met -->
    <div class="ins-card hidden" id="patternsCard">
      <div class="ins-card-head">
        <span class="ins-card-title">Your patterns</span>
        <span class="ins-card-sub">honest, floor-gated, always hedged</span>
      </div>
      <div id="patternList"></div>
    </div>

    <!-- Sub-meter: next stage unlock -->
    <div class="ins-card stage-card" id="stageCard">
      <div class="stage-hint" id="stageHint"></div>
      <div class="meter-track stage-track hidden" id="stageMeterTrack">
        <div class="meter-fill stage-fill" id="stageFill"></div>
      </div>
    </div>

    <!-- Stats row -->
    <div class="stats-row" id="statsRow"></div>
  </div>
  <script src="insights.js"></script>
</body>
</html>
