<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PULSE — Training</title>
  <link rel="stylesheet" href="training_card.css">
</head>
<body>
  <!-- Training card (spec §5b). One window, phases:
       getready → session → complete   (regular training session)
       getready → bigbreak_pick → bigbreak_timer                    (one-tap preset)
       getready → bigbreak_pick → bigbreak_activity → bigbreak_duration → bigbreak_timer
                                                                      (choose-your-own activity + duration)

       For hard-lock mode: "Skip" button is hidden; otherwise honor-based. Big Break
       hard-lock only applies at or below the duration ceiling and never to an
       open-ended session — see BIG_BREAK_HARDLOCK_CEILING_MIN in pulse/training.py. -->

  <!-- PHASE: Get-ready (90s countdown before the session) -->
  <div id="phaseGetready" class="card" hidden>
    <div class="kicker" id="grKicker">Training break</div>
    <div class="gr-session" id="grSession"><!-- filled by JS --></div>
    <div class="gr-timer-row">
      <span class="gr-timer-label">Starting in</span>
      <span class="gr-timer" id="grTimer">1:30</span>
    </div>
    <button class="action" id="grReady">I'm ready — start now</button>
    <button class="link-btn" id="grBigBreak">Or, go outside/move instead →</button>
  </div>

  <!-- PHASE: Session (exercises one by one) -->
  <div id="phaseSession" class="card" hidden>
    <div class="sess-progress" id="sessProgress">Exercise 1 of 2</div>
    <div class="sess-name" id="sessName">KB Swings</div>
    <div class="sess-meta">
      <span class="level-badge" id="sessLevel">L2</span>
      <span class="sess-work" id="sessWork">25 reps</span>
    </div>
    <div class="sess-cue" id="sessCue">Explosive hip snap, soft landing</div>
    <div class="sess-timer-row" id="sessTimerRow" hidden>
      <span class="sess-timer" id="sessTimer">0:45</span>
    </div>
    <button class="action" id="sessDone">Done ✓</button>
    <div class="sess-secondary">
      <button class="link-btn" id="sessSkip">Skip this exercise</button>
      <button class="link-btn pain-btn" id="sessPain">🚩 Pain</button>
    </div>
  </div>

  <!-- PHASE: Complete -->
  <div id="phaseComplete" class="card" hidden>
    <div class="kicker">Session complete</div>
    <div class="complete-check">✓</div>
    <div class="complete-msg" id="completeMsg"><!-- filled by JS --></div>
    <button class="action" id="completeClose">Close</button>
  </div>

  <!-- PHASE: Big Break — preset picker (one tap) + "Choose your own" -->
  <div id="phaseBigPick" class="card" hidden>
    <div class="kicker">Big Break</div>
    <div class="big-options" id="bigOptions"><!-- filled by JS: presets + "Choose your own" --></div>
  </div>

  <!-- PHASE: Big Break — activity grid (custom path) -->
  <div id="phaseBigActivity" class="card" hidden>
    <div class="kicker">Big Break — choose your own</div>
    <div class="big-activity-grid" id="bigActivityGrid"><!-- filled by JS --></div>
    <div class="big-activity-cue" id="bigActivityCue">&nbsp;</div>
    <button class="action" id="bigActivityNext" disabled>Continue →</button>
    <button class="link-btn" id="bigActivityBack">← back</button>
  </div>

  <!-- PHASE: Big Break — duration picker (custom path) -->
  <div id="phaseBigDuration" class="card" hidden>
    <div class="kicker">Big Break — how long?</div>
    <div class="big-duration-name" id="bigDurationName">Walk</div>
    <div class="control">
      <select id="bigDurationSelect"><!-- filled by JS --></select>
    </div>
    <button class="action" id="bigDurationStart">Start</button>
    <button class="link-btn" id="bigDurationBack">← back</button>
  </div>

  <!-- PHASE: Big Break — timer (countdown for a picked duration, or a stopwatch
       for open-ended) -->
  <div id="phaseBigTimer" class="card" hidden>
    <div class="kicker">Big Break</div>
    <div class="big-name" id="bigName">Sprint Intervals</div>
    <div class="big-desc" id="bigDesc"></div>
    <div class="big-cue"  id="bigCue"></div>
    <div class="big-timer" id="bigTimer">12:00</div>
    <button class="action" id="bigDone">Done — I'm back</button>
  </div>

  <script src="training_card.js"></script>
</body>
</html>
